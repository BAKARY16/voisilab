# =============================================================================
# VoisiLab – docker-compose.yml (PRODUCTION)
# Reverse proxy : Traefik (external, network: traefik-network)
# Base de données : MySQL externe via cPanel/phpMyAdmin (host.docker.internal)
# =============================================================================

services:

  # ────────────────────────────────────────────────────────────────────────────
  # API Backend – Express / TypeScript  →  api.fablab.voisilab.online
  # ────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: voisilab-api:latest
    container_name: voisilab-api
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3500

      # ── Base de données MySQL (cPanel externe) ──────────────────────────────
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}

      # ── Authentification JWT ────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # ── CORS – origines autorisées ──────────────────────────────────────────
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://fablab.voisilab.online,https://admin.fablab.voisilab.online}

      # ── URL des services (logs / infos) ────────────────────────────────────
      FRONTEND_URL: https://fablab.voisilab.online
      ADMIN_URL: https://admin.fablab.voisilab.online

      # ── EmailJS (notifications email) ───────────────────────────────────────
      EMAILJS_SERVICE_ID: ${EMAILJS_SERVICE_ID}
      EMAILJS_PUBLIC_KEY: ${EMAILJS_PUBLIC_KEY}
      EMAILJS_PRIVATE_KEY: ${EMAILJS_PRIVATE_KEY}
      EMAILJS_TEMPLATE_CONTACT: ${EMAILJS_TEMPLATE_CONTACT}
      EMAILJS_TEMPLATE_PROJECT: ${EMAILJS_TEMPLATE_PROJECT}
      ADMIN_NOTIFICATION_EMAIL: ${ADMIN_NOTIFICATION_EMAIL}

    volumes:
      # Persistance des fichiers uploadés (images, documents)
      - api_uploads:/app/uploads
      # Persistance des logs applicatifs
      - api_logs:/app/logs

    # Accès à MySQL externe via ip host du VPS
    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - traefik-network

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      # Router HTTP (redirection explicite vers HTTPS)
      - "traefik.http.routers.voisilab-api.rule=Host(`api.fablab.voisilab.online`)"
      - "traefik.http.routers.voisilab-api.entrypoints=web"
      - "traefik.http.routers.voisilab-api.middlewares=voisilab-api-redirect"
      - "traefik.http.middlewares.voisilab-api-redirect.redirectscheme.scheme=https"
      # Router HTTPS
      - "traefik.http.routers.voisilab-api-secure.rule=Host(`api.fablab.voisilab.online`)"
      - "traefik.http.routers.voisilab-api-secure.entrypoints=websecure"
      - "traefik.http.routers.voisilab-api-secure.tls=true"
      - "traefik.http.routers.voisilab-api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.voisilab-api-secure.service=voisilab-api"
      # Service (port interne)
      - "traefik.http.services.voisilab-api.loadbalancer.server.port=3500"

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # Site public – Next.js  →  fablab.voisilab.online
  # ────────────────────────────────────────────────────────────────────────────
  front:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        # Variables NEXT_PUBLIC_* embarquées au moment du build image
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.fablab.voisilab.online}
        NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${NEXT_PUBLIC_EMAILJS_SERVICE_ID}
        NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${NEXT_PUBLIC_EMAILJS_PUBLIC_KEY}
        NEXT_PUBLIC_EMAILJS_RECIPIENT_EMAIL: ${NEXT_PUBLIC_EMAILJS_RECIPIENT_EMAIL}
        NEXT_PUBLIC_EMAILJS_TEMPLATE_TEAM: ${NEXT_PUBLIC_EMAILJS_TEMPLATE_TEAM}
        NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT: ${NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT}
    image: voisilab-front:latest
    container_name: voisilab-front
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3501
      HOSTNAME: "0.0.0.0"
      # Variables runtime (secrets côté serveur Next.js)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.fablab.voisilab.online}
      RESEND_API_KEY: ${RESEND_API_KEY}

    networks:
      - traefik-network

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      # Router HTTP (redirection explicite vers HTTPS)
      - "traefik.http.routers.voisilab-front.rule=Host(`fablab.voisilab.online`)"
      - "traefik.http.routers.voisilab-front.entrypoints=web"
      - "traefik.http.routers.voisilab-front.middlewares=voisilab-front-redirect"
      - "traefik.http.middlewares.voisilab-front-redirect.redirectscheme.scheme=https"
      # Router HTTPS
      - "traefik.http.routers.voisilab-front-secure.rule=Host(`fablab.voisilab.online`)"
      - "traefik.http.routers.voisilab-front-secure.entrypoints=websecure"
      - "traefik.http.routers.voisilab-front-secure.tls=true"
      - "traefik.http.routers.voisilab-front-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.voisilab-front-secure.service=voisilab-front"
      # Service (port interne)
      - "traefik.http.services.voisilab-front.loadbalancer.server.port=3501"

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────────────
  # Dashboard Admin – Vite/React (Nginx)  →  admin.fablab.voisilab.online
  # ────────────────────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admins
      dockerfile: Dockerfile
      args:
        # Variables VITE_* embarquées au build (inline dans le bundle JS)
        VITE_API_URL: ${VITE_API_URL:-https://api.fablab.voisilab.online}
        VITE_APP_BASE_NAME: /
    image: voisilab-admin:latest
    container_name: voisilab-admin
    restart: unless-stopped

    networks:
      - traefik-network

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      # Router HTTP (redirection explicite vers HTTPS)
      - "traefik.http.routers.voisilab-admin.rule=Host(`admin.fablab.voisilab.online`)"
      - "traefik.http.routers.voisilab-admin.entrypoints=web"
      - "traefik.http.routers.voisilab-admin.middlewares=voisilab-admin-redirect"
      - "traefik.http.middlewares.voisilab-admin-redirect.redirectscheme.scheme=https"
      # Router HTTPS
      - "traefik.http.routers.voisilab-admin-secure.rule=Host(`admin.fablab.voisilab.online`)"
      - "traefik.http.routers.voisilab-admin-secure.entrypoints=websecure"
      - "traefik.http.routers.voisilab-admin-secure.tls=true"
      - "traefik.http.routers.voisilab-admin-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.voisilab-admin-secure.service=voisilab-admin"
      # Service (port interne Nginx)
      - "traefik.http.services.voisilab-admin.loadbalancer.server.port=3502"

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3502/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# =============================================================================
# Volumes persistants (uploads + logs API)
# =============================================================================
volumes:
  api_uploads:
    name: voisilab_api_uploads
  api_logs:
    name: voisilab_api_logs

# =============================================================================
# Réseau Traefik – doit exister avant le déploiement :
#   docker network create traefik-network
# =============================================================================
networks:
  traefik-network:
    external: true
